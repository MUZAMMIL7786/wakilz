<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Kimi Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* Star Background Canvas */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0d0d1a 0%, #050505 100%);
        }

        /* Custom Gradients */
        .text-gradient {
            background: linear-gradient(90deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
        }

        /* Glassmorphism Chat Window */
        .chat-container {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Typing cursor animation */
        .typing::after {
            content: '|';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Scrollbar styling */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- Star Background -->
    <canvas id="starCanvas"></canvas>

    <!-- Header -->
    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto relative z-10">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg"></div>
            <span class="text-xl font-bold tracking-tight">Kimi<span class="text-indigo-400">.</span></span>
        </div>
        <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
            <a href="#" class="hover:text-white transition">Features</a>
            <a href="#" class="hover:text-white transition">Showcase</a>
            <a href="#" class="hover:text-white transition">Pricing</a>
        </div>
        <button class="px-5 py-2 rounded-full border border-gray-700 text-sm font-medium hover:bg-white/5 transition">
            Log in
        </button>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center pt-20 px-4">
        <h1 class="text-5xl md:text-7xl font-bold text-center mb-6 tracking-tight">
            Build your dreams with <br> 
            <span class="text-gradient">Intelligence.</span>
        </h1>
        <p class="text-gray-400 text-center max-w-2xl text-lg mb-12">
            The next generation of AI-assisted creation. Describe your vision, and watch as our agent builds, styles, and deploys your website in seconds.
        </p>

        <!-- Enlarged Animated Chat Window -->
        <div class="chat-container w-full max-w-4xl h-[500px] flex flex-col overflow-hidden mb-12">
            <!-- Chat Header -->
            <div class="px-6 py-4 border-b border-white/10 flex items-center justify-between bg-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                    <span class="ml-2 text-xs font-mono text-gray-400 uppercase tracking-widest">Kimi-K2.5-Model</span>
                </div>
                <div class="text-xs text-gray-500">Connected</div>
            </div>

            <!-- Chat Content -->
            <div id="chatBox" class="flex-1 p-8 overflow-y-auto custom-scrollbar flex flex-col gap-6">
                <!-- Messages will be injected here -->
            </div>

            <!-- Chat Input (Visual Only) -->
            <div class="p-4 border-t border-white/10 bg-white/5">
                <div class="relative">
                    <div class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-sm text-gray-500">
                        Type your prompt here...
                    </div>
                    <div class="absolute right-3 top-2.5 px-3 py-1 bg-indigo-600 rounded-md text-xs font-semibold">Send</div>
                </div>
            </div>
        </div>

        <!-- CTA Button -->
        <button class="btn-gradient px-10 py-4 rounded-full text-lg font-bold mb-20">
            Start Generating Now
        </button>
    </main>

    <script>
        // --- Star Background Logic ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.05
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                
                star.opacity += star.speed;
                if (star.opacity > 1 || star.opacity < 0) star.speed = -star.speed;
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', initStars);
        initStars();
        drawStars();

        // --- Animated Chat Logic ---
        const chatBox = document.getElementById('chatBox');
        const conversation = [
            { role: 'user', text: "Can you help me build a modern landing page for my new startup?" },
            { role: 'assistant', text: "Of course! I've already initialized a dark-themed layout with a high-performance star background. What primary colors should I use for your brand?" },
            { role: 'user', text: "Let's go with deep purples and electric blues. It needs to look futuristic." },
            { role: 'assistant', text: "Perfect choice. Applying indigo-violet gradients and adding smooth glassmorphism effects now. Your site is ready for deployment. 🚀" }
        ];

        async function typeMessage(messageObj) {
            const div = document.createElement('div');
            div.className = `flex ${messageObj.role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[80%] px-5 py-3 rounded-2xl text-sm leading-relaxed ${
                messageObj.role === 'user' 
                ? 'bg-indigo-600/20 border border-indigo-500/30 text-indigo-100' 
                : 'bg-white/5 border border-white/10 text-gray-200'
            }`;
            
            div.appendChild(bubble);
            chatBox.appendChild(div);
            
            // Auto-scroll
            chatBox.scrollTop = chatBox.scrollHeight;

            const text = messageObj.text;
            for (let i = 0; i <= text.length; i++) {
                bubble.textContent = text.slice(0, i);
                if (i < text.length) bubble.className += ' typing';
                else bubble.className = bubble.className.replace(' typing', '');
                
                await new Promise(res => setTimeout(res, 20 + Math.random() * 30));
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        async function startChat() {
            for (const msg of conversation) {
                await new Promise(res => setTimeout(res, 1000));
                await typeMessage(msg);
            }
            // Loop chat for demo effect
            setTimeout(() => {
                chatBox.innerHTML = '';
                startChat();
            }, 5000);
        }

        startChat();
    </script>
</body>
</html>
